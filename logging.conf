[loggers]
keys=root,compare,mtgcompare_web,mtgcompare_history_import,mtgcompare_scrappers

[handlers]
keys=consoleHandler

[formatters]
keys=scrapper

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_compare]
level=WARNING
handlers=consoleHandler
qualname=compare
propagate=0

[logger_mtgcompare_web]
level=INFO
handlers=consoleHandler
qualname=mtgcompare.web
propagate=0

[logger_mtgcompare_history_import]
level=INFO
handlers=consoleHandler
qualname=mtgcompare.history_import
propagate=0

[logger_mtgcompare_scrappers]
level=INFO
handlers=consoleHandler
qualname=mtgcompare.scrappers
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=scrapper
args=(sys.stdout,)

[formatter_scrapper]
format=time=%(asctime)s level=%(levelname)s logger=%(name)s request_id=%(request_id)s user_id=%(user_id)s %(message)s
