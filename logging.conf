[loggers]
keys=root,hareruya,scryfall,singlestar,tokyomtg,compare

[handlers]
keys=consoleHandler

[formatters]
keys=scrapper

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_hareruya]
level=WARNING
handlers=consoleHandler
qualname=hareruya
propagate=0

[logger_scryfall]
level=WARNING
handlers=consoleHandler
qualname=scryfall
propagate=0

[logger_singlestar]
level=WARNING
handlers=consoleHandler
qualname=singlestar
propagate=0

[logger_tokyomtg]
level=WARNING
handlers=consoleHandler
qualname=tokyomtg
propagate=0

[logger_compare]
level=WARNING
handlers=consoleHandler
qualname=compare
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=WARNING
formatter=scrapper
args=(sys.stdout,)

[formatter_scrapper]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s