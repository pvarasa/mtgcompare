<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <title>{% block title %}MTG Compare{% endblock %}</title>
  <style>
    :root {
      --fg: #ede5d0;
      --muted: #7a82a0;
      --border: #2d3355;
      --bg: #0f1117;
      --bg-alt: #181c2a;
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.12);
      --blue: #5a9fd4;
      --green: #4db87a;
      --red: #d45252;
      --error-bg: #2d1010;
      --error-fg: #f5a5a5;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--fg);
      background: var(--bg);
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.4;
    }
    h1 {
      font-family: 'Cinzel', 'Palatino Linotype', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 1.5rem;
      display: flex;
      align-items: center;
      gap: .55rem;
    }
    h2 {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: .01em;
    }
    form { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    input[type=text] {
      flex: 1;
      padding: .6rem .8rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-alt);
      color: var(--fg);
    }
    input[type=text]:focus { outline: 2px solid var(--gold); border-color: transparent; }
    button {
      padding: .6rem 1.2rem;
      font-size: 1rem;
      border: 1px solid var(--gold);
      border-radius: 6px;
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, color .15s;
    }
    button:hover { background: var(--gold); color: #0f1117; }
    button:disabled {
      border-color: #353535;
      color: #484848;
      cursor: not-allowed;
      background: transparent;
    }
    .meta { color: var(--muted); font-size: .9rem; margin: 0 0 1rem; }
    .error {
      background: var(--error-bg);
      color: var(--error-fg);
      padding: .75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
    }
    .flash {
      background: rgba(77, 184, 122, 0.1);
      color: var(--green);
      border: 1px solid rgba(77, 184, 122, 0.25);
      padding: .6rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .95rem;
    }
    th, td {
      padding: .55rem .6rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    th {
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      border-bottom: 2px solid var(--gold);
    }
    tbody tr:nth-child(even) { background: rgba(29, 33, 56, 0.45); }
    tbody tr.cheapest { background: rgba(201, 168, 76, 0.1); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .empty { color: var(--muted); padding: 2rem 0; text-align: center; }
    .flag {
      display: inline-block;
      margin-right: .3rem;
      font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }
    .badge {
      display: inline-block;
      padding: .1rem .45rem;
      font-size: .75rem;
      border-radius: 4px;
      background: rgba(201, 168, 76, 0.15);
      color: var(--gold);
      border: 1px solid rgba(201, 168, 76, 0.3);
      margin-left: .4rem;
    }
    .tabs { display: flex; gap: .3rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tabs a {
      padding: .55rem 1.4rem;
      color: var(--muted);
      font-family: 'Cinzel', 'Palatino Linotype', Georgia, serif;
      font-size: .78rem;
      font-weight: 400;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 5px 5px 0 0;
      margin-bottom: -1px;
      transition: color .15s, background .15s;
    }
    .tabs a:hover { color: var(--gold); text-decoration: none; }
    .tabs a.active {
      color: var(--gold);
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      border-bottom: 1px solid var(--bg);
    }
    .card-icon {
      background: transparent;
      border: 0;
      padding: 2px 4px;
      margin-right: .35rem;
      color: var(--muted);
      cursor: pointer;
      vertical-align: -3px;
      border-radius: 4px;
      line-height: 0;
      transition: none;
    }
    .card-icon:hover { color: var(--fg); background: var(--bg-alt); }
    .card-icon svg { display: block; }
    .card-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .8);
      display: none;
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .card-modal.open { display: flex; }
    .card-modal-inner { position: relative; }
    .card-modal-img {
      display: none;
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      border: 1px solid var(--gold);
      box-shadow: 0 0 40px rgba(201, 168, 76, 0.15), 0 12px 32px rgba(0, 0, 0, .7);
    }
    .card-modal-msg {
      color: var(--muted);
      font-size: 1rem;
      padding: 2rem 3rem;
      background: var(--bg-alt);
      border-radius: 12px;
    }
    .card-modal-close {
      position: absolute;
      top: -2rem;
      right: -.25rem;
      background: transparent;
      color: var(--fg);
      font-size: 1.8rem;
      line-height: 1;
      padding: 0 .4rem;
      border: 0;
      cursor: pointer;
    }
    .card-modal-close:hover { color: var(--gold); background: transparent; }
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <h1>
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" style="flex-shrink:0">
      <path d="M12 2 L22 12 L12 22 L2 12 Z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M12 6.5 L17.5 12 L12 17.5 L6.5 12 Z" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" opacity="0.55"/>
    </svg>
    MTG Compare
  </h1>
  {% include "_nav.html" %}

  {% with messages = get_flashed_messages() %}
    {% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}

  <script src="{{ url_for('static', filename='cardpreview.js') }}" defer></script>
</body>
</html>
