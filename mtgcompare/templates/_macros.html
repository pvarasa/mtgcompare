{% macro card_icon(name, set='') %}
  <button type="button" class="card-icon"
          data-name="{{ name }}"{% if set %} data-set="{{ set }}"{% endif %}
          aria-label="Show card image">
    <svg width="14" height="18" viewBox="0 0 14 18" aria-hidden="true">
      <rect x="1" y="1" width="12" height="16" rx="1.5"
            fill="none" stroke="currentColor" stroke-width="1.3"/>
      <rect x="3" y="3.5" width="8" height="5" fill="currentColor"/>
      <line x1="3" y1="10.5" x2="11" y2="10.5" stroke="currentColor" stroke-width="1"/>
      <line x1="3" y1="12.5" x2="11" y2="12.5" stroke="currentColor" stroke-width="1"/>
      <line x1="3" y1="14.5" x2="8"  y2="14.5" stroke="currentColor" stroke-width="1"/>
    </svg>
  </button>
{% endmacro %}
