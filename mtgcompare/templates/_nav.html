<nav class="tabs">
  <a href="{{ url_for('index') }}"     class="{% if active == 'search'    %}active{% endif %}">Search</a>
  <a href="{{ url_for('inventory') }}" class="{% if active == 'inventory' %}active{% endif %}">Inventory</a>
  <a href="{{ url_for('market') }}"    class="{% if active == 'market'    %}active{% endif %}">Market</a>
  {% if workos_enabled %}
  <form method="post" action="{{ url_for('auth.logout') }}" class="logout-form" style="margin-left:auto">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="logout-button">Sign out</button>
  </form>
  {% endif %}
</nav>
