name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install build dependencies
        run: uv pip install pyinstaller pystray pillow

      - name: Run tests
        run: uv run pytest

      - name: Build
        run: uv run pyinstaller mtgcompare.spec --clean --noconfirm

      - name: Zip
        run: Compress-Archive -Path dist\mtgcompare -DestinationPath dist\mtgcompare-windows.zip

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mtgcompare-windows.zip
          generate_release_notes: true
