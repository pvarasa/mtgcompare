name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install build dependencies
        run: uv pip install pyinstaller pystray pillow

      - name: Run tests
        run: uv run pytest

      - name: Build
        run: uv run pyinstaller mtgcompare.spec --clean --noconfirm

      - name: Zip
        run: Compress-Archive -Path dist\mtgcompare -DestinationPath dist\mtgcompare-windows.zip

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mtgcompare-windows.zip
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install build dependencies
        run: uv pip install pyinstaller pystray pillow pyobjc-framework-Cocoa

      - name: Run tests
        run: uv run pytest

      - name: Build
        run: uv run pyinstaller mtgcompare.spec --clean --noconfirm

      - name: Zip
        run: cd dist && zip -r mtgcompare-macos.zip "MTG Compare.app"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mtgcompare-macos.zip
          generate_release_notes: false

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
